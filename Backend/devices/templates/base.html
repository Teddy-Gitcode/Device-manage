{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}NOC Device Monitor{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    <link href="{% static 'devices/custom.css' %}" rel="stylesheet" />
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <nav class="ketepa-navbar">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
        <a href="{% url 'dashboard' %}" class="navbar-brand">
          <i class="fas fa-network-wired me-2"></i>
          <span>NOC Device Monitor</span>
        </a>
        <div class="d-flex gap-2 align-items-center">
          <a href="{% url 'dashboard' %}" class="nav-link">Dashboard</a>
          <a href="/admin/" class="nav-link">Admin</a>
          <div class="dropdown">
            <button class="btn btn-sm btn-outline-light position-relative" type="button" id="notificationDropdown" data-bs-toggle="dropdown" aria-expanded="false">
              <i class="fas fa-bell"></i>
              <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="notificationBadge" style="display: none;">
                0
              </span>
            </button>
            <div class="dropdown-menu dropdown-menu-end p-0" aria-labelledby="notificationDropdown" style="width: 360px; max-height: 500px; overflow-y: auto;">
              <div class="dropdown-header d-flex justify-content-between align-items-center">
                <span><i class="fas fa-bell me-2"></i>Notifications</span>
                <button class="btn btn-sm btn-link text-decoration-none p-0" onclick="document.getElementById('notificationList').innerHTML='<div class=\'text-center py-3 text-muted\'>No alerts</div>'; document.getElementById(\'notificationBadge\').style.display=\'none\';">Clear All</button>
              </div>
              <div id="notificationList" hx-get="{% url 'notifications_partial' %}" hx-trigger="load, every 15s" hx-swap="innerHTML">
                <div class="text-center py-3 text-muted">
                  <div class="spinner-border spinner-border-sm" role="status">
                    <span class="visually-hidden">Loading...</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <div class="main-container">
      {% block content %}{% endblock %}
    </div>

    <div id="toastContainer" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999; max-width: 350px;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
(function() {
  document.body.addEventListener('htmx:afterSwap', function(evt) {
    if (evt.detail.target.id === 'notificationList') {
      const items = evt.detail.target.querySelectorAll('.notification-item');
      const badge = document.getElementById('notificationBadge');
      if (items.length > 0) {
        badge.textContent = items.length;
        badge.style.display = 'inline-block';
      } else {
        badge.style.display = 'none';
      }
    }
  });

  window.showToast = function(message, type) {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast align-items-center text-white bg-' + type + ' border-0 mb-2';
    toast.setAttribute('role', 'alert');
    toast.setAttribute('aria-live', 'assertive');
    toast.setAttribute('aria-atomic', 'true');
    toast.innerHTML = '<div class="d-flex"><div class="toast-body">' + message + '</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button></div>';
    container.appendChild(toast);
    const bsToast = new bootstrap.Toast(toast, { delay: 5000 });
    bsToast.show();
    toast.addEventListener('hidden.bs.toast', function() {
      toast.remove();
    });
  };
})();
    </script>
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
