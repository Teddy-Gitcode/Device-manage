services:
  # 1. Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: devicemonitor
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: corporate_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # 2. Message Broker
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # 3. Python Backend
  backend:
    build: ./Backend   # Matches your exact folder name
    volumes:
      - ./Backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://admin:corporate_password@db:5432/devicemonitor
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - SUBNET_PREFIX=192.168
      - DJANGO_SETTINGS_MODULE=printer.settings
    depends_on:
      - db
      - redis

  # 4. Background Task Poller
  celery_worker:
    build: ./Backend
    working_dir: /app
    command: celery -A printer.celery worker -l info --concurrency=4
    volumes:
      - ./Backend:/app
    network_mode: "host"
    environment:
      - DATABASE_URL=postgres://admin:corporate_password@localhost:5432/devicemonitor
      - REDIS_URL=redis://localhost:6379/0
      - CELERY_BROKER_URL=redis://localhost:6379/1
      - SUBNET_PREFIX=192.168
      - DJANGO_SETTINGS_MODULE=printer.settings

  # 5. Celery Beat (scheduler for discovery & polling)
  celery_beat:
    build: ./Backend
    working_dir: /app
    command: celery -A printer.celery beat -l info
    volumes:
      - ./Backend:/app
    environment:
      - DATABASE_URL=postgres://admin:corporate_password@db:5432/devicemonitor
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - SUBNET_PREFIX=192.168
      - DJANGO_SETTINGS_MODULE=printer.settings
    depends_on:
      - backend
      - redis

volumes:
  postgres_data: