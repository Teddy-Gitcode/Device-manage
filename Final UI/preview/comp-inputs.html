<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card">
  <div style="display:flex; flex-direction:column; gap:12px; max-width:380px;">
    <label style="display:flex; flex-direction:column; gap:4px;">
      <span style="font-size:12px; color:#424242; font-weight:500;">Device name</span>
      <input value="HP LaserJet M506" style="height:32px; padding:0 10px; border:1px solid #d1d1d1; border-radius:4px; font-family:inherit; font-size:13px; color:#242424; background:#fff;"/>
    </label>
    <label style="display:flex; flex-direction:column; gap:4px;">
      <span style="font-size:12px; color:#424242; font-weight:500;">Location</span>
      <input placeholder="HQ · Floor 3 · Finance" style="height:32px; padding:0 10px; border:1px solid #0f6cbd; outline:2px solid #9ec7ee; outline-offset:-3px; border-radius:4px; font-family:inherit; font-size:13px; color:#8a8886; background:#fff;"/>
    </label>
    <label style="display:flex; flex-direction:column; gap:4px;">
      <span style="font-size:12px; color:#a4262c; font-weight:500;">IP address — invalid</span>
      <input value="192.168.1" style="height:32px; padding:0 10px; border:1px solid #a4262c; border-radius:4px; font-family:inherit; font-size:13px; color:#242424; background:#fff;"/>
    </label>
  </div>
</div>
</body></html>
