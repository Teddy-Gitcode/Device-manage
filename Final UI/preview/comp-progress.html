<!doctype html>
<html><head><meta charset="utf-8"><title>Progress bars</title><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card" style="padding:14px 16px;">
  <div style="display:flex; flex-direction:column; gap:10px;">
    <div><div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px;"><span>Utilization · under</span><span style="color:#616161; font-variant-numeric: tabular-nums;">14%</span></div><div style="height:6px; background:#f5f5f5; border-radius:3px; overflow:hidden;"><div style="width:14%; height:100%; background:#bdbdbd;"></div></div></div>
    <div><div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px;"><span>Utilization · healthy</span><span style="color:#616161; font-variant-numeric: tabular-nums;">67%</span></div><div style="height:6px; background:#f5f5f5; border-radius:3px; overflow:hidden;"><div style="width:67%; height:100%; background:#0f6cbd;"></div></div></div>
    <div><div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px;"><span>Utilization · over duty</span><span style="color:#a4262c; font-weight:500; font-variant-numeric: tabular-nums;">94%</span></div><div style="height:6px; background:#f5f5f5; border-radius:3px; overflow:hidden;"><div style="width:94%; height:100%; background:#a4262c;"></div></div></div>
    <div><div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px;"><span>Quota · over</span><span style="color:#835c00; font-weight:500; font-variant-numeric: tabular-nums;">2,240 / 2,000</span></div><div style="height:6px; background:#f5f5f5; border-radius:3px; overflow:hidden;"><div style="width:100%; height:100%; background:#835c00;"></div></div></div>
  </div>
</div>
</body></html>
