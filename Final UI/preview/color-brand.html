<!doctype html>
<html><head><meta charset="utf-8"><title>Brand palette</title><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card">
  <div class="grid" style="grid-template-columns: repeat(6, 1fr); gap: 10px;">
    <div class="swatch-col"><div class="swatch" style="background:#0f6cbd"></div><span class="name">Brand</span><span>#0F6CBD</span></div>
    <div class="swatch-col"><div class="swatch" style="background:#115ea3"></div><span class="name">Hover</span><span>#115EA3</span></div>
    <div class="swatch-col"><div class="swatch" style="background:#0c3b5e"></div><span class="name">Pressed</span><span>#0C3B5E</span></div>
    <div class="swatch-col"><div class="swatch" style="background:#9ec7ee"></div><span class="name">Tint 40</span><span>#9EC7EE</span></div>
    <div class="swatch-col"><div class="swatch" style="background:#d0e2f5"></div><span class="name">Tint 20</span><span>#D0E2F5</span></div>
    <div class="swatch-col"><div class="swatch" style="background:#ebf3fc"></div><span class="name">Tint 10</span><span>#EBF3FC</span></div>
  </div>
</div>
</body></html>
