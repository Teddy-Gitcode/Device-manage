<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card">
  <div style="display:flex; flex-direction:column; gap:10px; max-width:420px;">
    <div style="display:flex; flex-direction:column; gap:4px;">
      <label style="font-size:12px; font-weight:500; color:#424242;">Device name</label>
      <input value="HP LaserJet M506" style="height:32px; padding:0 10px; border:1px solid #d1d1d1; border-bottom:2px solid #616161; border-radius:4px; font-size:14px; color:#242424; font-family:inherit; outline:none;"/>
    </div>
    <div style="display:flex; flex-direction:column; gap:4px;">
      <label style="font-size:12px; font-weight:500; color:#424242;">Search</label>
      <input placeholder="Search devices, jobs, users…" style="height:32px; padding:0 10px; border:1px solid #d1d1d1; border-bottom:2px solid #d1d1d1; border-radius:4px; font-size:14px; color:#8a8886; font-family:inherit; background:#fafafa; outline:none;"/>
    </div>
    <div style="display:flex; flex-direction:column; gap:4px;">
      <label style="font-size:12px; font-weight:500; color:#424242;">Focused</label>
      <input value="" style="height:32px; padding:0 10px; border:1px solid #0f6cbd; border-bottom:2px solid #0f6cbd; border-radius:4px; font-size:14px; color:#242424; font-family:inherit; outline:none;"/>
    </div>
  </div>
</div>
</body></html>
