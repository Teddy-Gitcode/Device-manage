<!doctype html>
<html><head><meta charset="utf-8"><title>Heatmap</title><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card" style="padding:14px 16px;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
    <div style="font-size:14px; font-weight:600;">Print activity · 7 days × 24 hours</div>
    <div style="display:flex; gap:4px; align-items:center; font-size:10px; color:#616161;">Low <span style="width:10px; height:10px; background:#ebf3fc;"></span><span style="width:10px; height:10px; background:#9ec7ee;"></span><span style="width:10px; height:10px; background:#0f6cbd;"></span><span style="width:10px; height:10px; background:#0c3b5e;"></span> High</div>
  </div>
  <div id="g" style="display:grid; grid-template-columns: repeat(24, 1fr); gap:2px;"></div>
</div>
<script>
const g = document.getElementById('g');
const days = 7, hrs = 24;
for (let d=0; d<days; d++){ for (let h=0; h<hrs; h++){
  const work = (h>=8 && h<=17); const wk = d<5;
  let v = work && wk ? Math.random()*0.8+0.2 : Math.random()*0.2;
  const c = v<0.15 ? '#f5f5f5' : v<0.35 ? '#ebf3fc' : v<0.6 ? '#9ec7ee' : v<0.8 ? '#0f6cbd' : '#0c3b5e';
  const cell = document.createElement('div'); cell.style.cssText = `height:16px; background:${c}; border-radius:2px;`; g.appendChild(cell);
}}
</script>
</body></html>
