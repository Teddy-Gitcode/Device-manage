<!doctype html>
<html><head><meta charset="utf-8"><title>Numerics</title><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card">
  <div style="display:flex; gap:32px; align-items:flex-end; font-variant-numeric: tabular-nums;">
    <div style="display:flex; flex-direction:column; gap:4px;">
      <div style="font-size:11px; color:#616161; text-transform:uppercase; letter-spacing:0.04em;">Active devices</div>
      <div style="font-size:32px; line-height:40px; font-weight:600; letter-spacing:-0.01em;">24<span style="font-size:18px; color:#616161; font-weight:500;"> / 29</span></div>
    </div>
    <div style="display:flex; flex-direction:column; gap:4px;">
      <div style="font-size:11px; color:#616161; text-transform:uppercase; letter-spacing:0.04em;">Pages (30d)</div>
      <div style="font-size:32px; line-height:40px; font-weight:600; letter-spacing:-0.01em;">1,284,500</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:4px;">
      <div style="font-size:11px; color:#616161; text-transform:uppercase; letter-spacing:0.04em;">Cost</div>
      <div style="font-size:32px; line-height:40px; font-weight:600; letter-spacing:-0.01em;">KES 148,200</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:4px;">
      <div style="font-size:11px; color:#616161; text-transform:uppercase; letter-spacing:0.04em;">Avg util</div>
      <div style="font-size:32px; line-height:40px; font-weight:600; letter-spacing:-0.01em;">67%</div>
    </div>
  </div>
</div>
</body></html>
