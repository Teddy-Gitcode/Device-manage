<!doctype html>
<html><head><meta charset="utf-8"><title>Status colors</title><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card">
  <div class="grid" style="grid-template-columns: repeat(4, 1fr); gap: 10px;">
    <div class="col">
      <div style="padding:10px 12px; border-radius:4px; background:#dff6dd; color:#107c10; border:1px solid #9fd89f; font-size:12px; font-weight:500;">Online</div>
      <div class="swatch-col"><span>bg #DFF6DD</span><span>fg #107C10</span><span>bd #9FD89F</span></div>
    </div>
    <div class="col">
      <div style="padding:10px 12px; border-radius:4px; background:#fff4ce; color:#835c00; border:1px solid #fdcfb4; font-size:12px; font-weight:500;">Warning</div>
      <div class="swatch-col"><span>bg #FFF4CE</span><span>fg #835C00</span><span>bd #FDCFB4</span></div>
    </div>
    <div class="col">
      <div style="padding:10px 12px; border-radius:4px; background:#fde7e9; color:#a4262c; border:1px solid #f1bbbc; font-size:12px; font-weight:500;">Needs service</div>
      <div class="swatch-col"><span>bg #FDE7E9</span><span>fg #A4262C</span><span>bd #F1BBBC</span></div>
    </div>
    <div class="col">
      <div style="padding:10px 12px; border-radius:4px; background:#ebf3fc; color:#0f6cbd; border:1px solid #9ec7ee; font-size:12px; font-weight:500;">Information</div>
      <div class="swatch-col"><span>bg #EBF3FC</span><span>fg #0F6CBD</span><span>bd #9EC7EE</span></div>
    </div>
  </div>
</div>
</body></html>
