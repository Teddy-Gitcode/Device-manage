<!doctype html>
<html><head><meta charset="utf-8"><title>Toner channels</title><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card">
  <div class="grid" style="grid-template-columns: repeat(5, 1fr); gap: 10px;">
    <div class="swatch-col"><div class="swatch" style="background:#242424"></div><span class="name">K — Black</span><span>#242424</span></div>
    <div class="swatch-col"><div class="swatch" style="background:#009dd8"></div><span class="name">C — Cyan</span><span>#009DD8</span></div>
    <div class="swatch-col"><div class="swatch" style="background:#d83b9d"></div><span class="name">M — Magenta</span><span>#D83B9D</span></div>
    <div class="swatch-col"><div class="swatch" style="background:#f2c811"></div><span class="name">Y — Yellow</span><span>#F2C811</span></div>
    <div class="swatch-col"><div class="swatch" style="background:#616161"></div><span class="name">P — Paper</span><span>#616161</span></div>
  </div>
  <div style="margin-top:14px; display:flex; gap:12px; align-items:flex-end;">
    <div style="display:flex; flex-direction:column; gap:2px; width:60px;"><div style="height:6px; background:#f5f5f5; border-radius:2px; overflow:hidden;"><div style="height:100%; width:84%; background:#242424;"></div></div><span style="font-size:10px; color:#616161;">K 84%</span></div>
    <div style="display:flex; flex-direction:column; gap:2px; width:60px;"><div style="height:6px; background:#f5f5f5; border-radius:2px; overflow:hidden;"><div style="height:100%; width:42%; background:#009dd8;"></div></div><span style="font-size:10px; color:#616161;">C 42%</span></div>
    <div style="display:flex; flex-direction:column; gap:2px; width:60px;"><div style="height:6px; background:#f5f5f5; border-radius:2px; overflow:hidden;"><div style="height:100%; width:67%; background:#d83b9d;"></div></div><span style="font-size:10px; color:#616161;">M 67%</span></div>
    <div style="display:flex; flex-direction:column; gap:2px; width:60px;"><div style="height:6px; background:#f5f5f5; border-radius:2px; overflow:hidden;"><div style="height:100%; width:15%; background:#a4262c;"></div></div><span style="font-size:10px; color:#a4262c;">Y 15%</span></div>
  </div>
</div>
</body></html>
