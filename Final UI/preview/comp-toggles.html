<!doctype html>
<html><head><meta charset="utf-8"><title>Toggles</title><link rel="stylesheet" href="card.css"></head>
<body>
<style>
.toggle { width:36px; height:20px; border-radius:999px; background:#bdbdbd; position:relative; flex-shrink:0; cursor:pointer; transition: background .14s; }
.toggle::after { content:''; position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:999px; background:#fff; transition: left .14s; box-shadow:0 1px 2px rgba(0,0,0,.2); }
.toggle.on { background:#0f6cbd; }
.toggle.on::after { left:18px; }
.row { display:flex; align-items:center; gap:10px; padding:8px 0; }
.name { font-size:13px; color:#242424; font-weight:500; }
.desc { font-size:11px; color:#616161; }
</style>
<div class="card">
  <div style="display:flex; flex-direction:column;">
    <div class="row"><div class="toggle on"></div><div style="display:flex; flex-direction:column;"><span class="name">Duplex by default</span><span class="desc">Force two-sided printing for all mono jobs.</span></div></div>
    <div class="row"><div class="toggle on"></div><div style="display:flex; flex-direction:column;"><span class="name">Secure release</span><span class="desc">Hold color jobs until user tap at device.</span></div></div>
    <div class="row"><div class="toggle"></div><div style="display:flex; flex-direction:column;"><span class="name">Monthly quota enforcement</span><span class="desc">Block users over 2,000 pages / month.</span></div></div>
  </div>
</div>
</body></html>
