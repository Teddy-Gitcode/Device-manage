<!doctype html>
<html><head><meta charset="utf-8"><title>Badges</title><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card">
  <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
    <span style="display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:4px; background:#dff6dd; color:#107c10; border:1px solid #9fd89f; font-size:12px; font-weight:500;"><span style="width:6px; height:6px; border-radius:999px; background:#107c10;"></span>Online</span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:4px; background:#fff4ce; color:#835c00; border:1px solid #fdcfb4; font-size:12px; font-weight:500;"><span style="width:6px; height:6px; border-radius:999px; background:#835c00;"></span>Warning</span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:4px; background:#fde7e9; color:#a4262c; border:1px solid #f1bbbc; font-size:12px; font-weight:500;"><span style="width:6px; height:6px; border-radius:999px; background:#a4262c;"></span>Needs service</span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:4px; background:#f5f5f5; color:#616161; border:1px solid #e0e0e0; font-size:12px; font-weight:500;"><span style="width:6px; height:6px; border-radius:999px; background:#8a8886;"></span>Idle</span>
    <span style="display:inline-flex; align-items:center; padding:3px 10px; border-radius:4px; background:#ebf3fc; color:#0f6cbd; border:1px solid #9ec7ee; font-size:12px; font-weight:500;">Information</span>
  </div>
  <div style="margin-top:14px; display:flex; gap:8px;">
    <span style="display:inline-flex; align-items:center; padding:3px 10px; border-radius:4px; background:#dff6dd; color:#107c10; border:1px solid #9fd89f; font-size:12px; font-weight:500;">Keep</span>
    <span style="display:inline-flex; align-items:center; padding:3px 10px; border-radius:4px; background:#ebf3fc; color:#0f6cbd; border:1px solid #9ec7ee; font-size:12px; font-weight:500;">Relocate</span>
    <span style="display:inline-flex; align-items:center; padding:3px 10px; border-radius:4px; background:#fde7e9; color:#a4262c; border:1px solid #f1bbbc; font-size:12px; font-weight:500;">Service</span>
  </div>
</div>
</body></html>
