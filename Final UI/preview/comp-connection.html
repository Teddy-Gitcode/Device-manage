<!doctype html>
<html><head><meta charset="utf-8"><title>Connection states</title><link rel="stylesheet" href="card.css"></head>
<body>
<style>
@keyframes p { 0%,100% { opacity:1; } 50% { opacity:.4; } }
.pulse { animation: p 1.2s ease-in-out infinite; }
.dot { width:8px; height:8px; border-radius:999px; display:inline-block; }
.row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid #f0f0f0; }
.row:last-child { border:none; }
</style>
<div class="card" style="padding:14px 16px;">
  <div class="row"><span class="dot" style="background:#107c10;"></span><div><div style="font-size:13px; font-weight:500;">Connected</div><div style="font-size:11px; color:#616161;">WebSocket live — events arrive in real time</div></div></div>
  <div class="row"><span class="dot pulse" style="background:#835c00;"></span><div><div style="font-size:13px; font-weight:500;">Reconnecting</div><div style="font-size:11px; color:#616161;">Retrying with exponential backoff (max 30s)</div></div></div>
  <div class="row"><span class="dot" style="background:#a4262c;"></span><div><div style="font-size:13px; font-weight:500;">Offline</div><div style="font-size:11px; color:#616161;">Last data shown — never a blocking modal</div></div></div>
</div>
</body></html>
