<html><head><meta charset="utf-8"><title>Type ramp</title><link rel="stylesheet" href="card.css"></head>

    <div style="display:flex; gap:16px; align-items:baseline;"><span style="font-size:16px; line-height:22px; font-weight:500;">Subsection</span><span style="font-size:11px; color:#616161;">16 / 22 · 500</span></div>
  </div>
