<!doctype html>
<html><head><meta charset="utf-8"><title>Foregrounds</title><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card">
  <div class="grid" style="grid-template-columns: repeat(5, 1fr); gap: 10px;">
    <div class="swatch-col"><div class="swatch" style="background:#242424"></div><span class="name">fg-1</span><span>#242424</span></div>
    <div class="swatch-col"><div class="swatch" style="background:#424242"></div><span class="name">fg-2</span><span>#424242</span></div>
    <div class="swatch-col"><div class="swatch" style="background:#616161"></div><span class="name">fg-3</span><span>#616161</span></div>
    <div class="swatch-col"><div class="swatch" style="background:#8a8886"></div><span class="name">hint</span><span>#8A8886</span></div>
    <div class="swatch-col"><div class="swatch" style="background:#bdbdbd"></div><span class="name">disabled</span><span>#BDBDBD</span></div>
  </div>
  <div style="margin-top:14px; display:flex; flex-direction:column; gap:4px;">
    <div style="color:#242424; font-size:14px; font-weight:500;">Primary — "Device fleet"</div>
    <div style="color:#424242; font-size:13px;">Secondary — 29 devices across 6 locations</div>
    <div style="color:#616161; font-size:12px;">Tertiary — last updated 2m ago</div>
    <div style="color:#8a8886; font-size:12px;">Hint — Search devices, jobs, users…</div>
  </div>
</div>
</body></html>
