<!doctype html>
<html><head><meta charset="utf-8"><title>Service ticket</title><link rel="stylesheet" href="card.css"></head>
<body>
<style>
.ticket { display:flex; gap:12px; padding:12px; border:1px solid #e0e0e0; border-left-width:3px; border-radius:6px; margin-bottom:8px; background:#fff; }
.high { border-left-color:#a4262c; }
.med { border-left-color:#835c00; }
.low { border-left-color:#0f6cbd; }
.pri { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; padding:2px 6px; border-radius:3px; }
.pri-h { background:#fde7e9; color:#a4262c; }
.pri-m { background:#fff4ce; color:#835c00; }
.pri-l { background:#ebf3fc; color:#0f6cbd; }
</style>
<div class="card" style="padding:12px;">
<div class="ticket high">
  <div style="flex:1;">
    <div style="display:flex; gap:6px; align-items:center;"><span class="pri pri-h">High</span><span style="font-size:11px; color:#616161; font-variant-numeric: tabular-nums;">TKT-2341</span></div>
    <div style="font-size:13px; font-weight:500; margin-top:4px;">Paper jam recurring at feed tray</div>
    <div style="font-size:11px; color:#616161; margin-top:2px;">PR-004 · Mombasa Export · assigned to J. Kamau · 2h ago</div>
  </div>
</div>
<div class="ticket med">
  <div style="flex:1;">
    <div style="display:flex; gap:6px; align-items:center;"><span class="pri pri-m">Medium</span><span style="font-size:11px; color:#616161; font-variant-numeric: tabular-nums;">TKT-2344</span></div>
    <div style="font-size:13px; font-weight:500; margin-top:4px;">Schedule toner replacement</div>
    <div style="font-size:11px; color:#616161; margin-top:2px;">PR-009 · Kericho Plant · unassigned · 6h ago</div>
  </div>
</div>
</div>
</body></html>
