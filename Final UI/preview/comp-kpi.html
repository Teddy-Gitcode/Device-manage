<!doctype html>
<html><head><meta charset="utf-8"><title>KPI tile</title><link rel="stylesheet" href="card.css"></head>
<body>
<div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:12px;">
  <div class="card" style="padding:16px;">
    <div style="font-size:11px; color:#616161; text-transform:uppercase; letter-spacing:.04em; font-weight:500;">Active devices</div>
    <div style="display:flex; align-items:baseline; gap:8px; margin-top:6px;"><span style="font-size:28px; line-height:36px; font-weight:600; letter-spacing:-0.01em;">24</span><span style="font-size:13px; color:#616161;">/ 29</span></div>
    <svg width="100%" height="24" viewBox="0 0 120 24" style="margin-top:8px;"><polyline points="0,18 17,14 34,16 51,10 68,8 85,11 102,6 120,4" fill="none" stroke="#0f6cbd" stroke-width="1.5"/></svg>
  </div>
  <div class="card" style="padding:16px;">
    <div style="font-size:11px; color:#616161; text-transform:uppercase; letter-spacing:.04em; font-weight:500;">Pages (30d)</div>
    <div style="display:flex; align-items:baseline; gap:8px; margin-top:6px;"><span style="font-size:28px; line-height:36px; font-weight:600; letter-spacing:-0.01em;">1.28M</span><span style="font-size:12px; color:#107c10;">+4.1%</span></div>
    <svg width="100%" height="24" viewBox="0 0 120 24" style="margin-top:8px;"><polyline points="0,18 17,16 34,13 51,14 68,10 85,12 102,8 120,5" fill="none" stroke="#0f6cbd" stroke-width="1.5"/></svg>
  </div>
  <div class="card" style="padding:16px;">
    <div style="font-size:11px; color:#616161; text-transform:uppercase; letter-spacing:.04em; font-weight:500;">Avg utilization</div>
    <div style="display:flex; align-items:baseline; gap:8px; margin-top:6px;"><span style="font-size:28px; line-height:36px; font-weight:600; letter-spacing:-0.01em;">67%</span></div>
    <svg width="100%" height="24" viewBox="0 0 120 24" style="margin-top:8px;"><polyline points="0,10 17,11 34,14 51,9 68,12 85,8 102,10 120,9" fill="none" stroke="#0f6cbd" stroke-width="1.5"/></svg>
  </div>
  <div class="card" style="padding:16px;">
    <div style="font-size:11px; color:#616161; text-transform:uppercase; letter-spacing:.04em; font-weight:500;">Open alerts</div>
    <div style="display:flex; align-items:baseline; gap:8px; margin-top:6px;"><span style="font-size:28px; line-height:36px; font-weight:600; color:#a4262c; letter-spacing:-0.01em;">5</span></div>
    <svg width="100%" height="24" viewBox="0 0 120 24" style="margin-top:8px;"><polyline points="0,18 17,15 34,16 51,14 68,10 85,11 102,7 120,6" fill="none" stroke="#a4262c" stroke-width="1.5"/></svg>
  </div>
</div>
</body></html>
