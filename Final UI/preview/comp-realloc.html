<!doctype html>
<html><head><meta charset="utf-8"><title>Reallocation card</title><link rel="stylesheet" href="card.css"></head>
<body>
<style>
.rc { padding:12px 14px; border:1px solid #e0e0e0; border-radius:6px; margin-bottom:8px;}
.from, .to { font-size:12px; }
.lbl { font-size:10px; color:#616161; text-transform:uppercase; letter-spacing:.04em; font-weight:500; }
.nm { font-size:13px; font-weight:500; color:#242424; }
.sub { font-size:11px; color:#616161; }
.util { font-size:11px; font-weight:500; padding:1px 6px; border-radius:3px; border:1px solid; }
.hi { background:#fde7e9; color:#a4262c; border-color:#f1bbbc; }
.lo { background:#f5f5f5; color:#616161; border-color:#e0e0e0; }
</style>
<div class="card" style="padding:12px;">
  <div class="rc">
    <div style="display:flex; align-items:center; gap:12px;">
      <div style="flex:1;"><div class="lbl">From</div><div class="nm">PR-004 · Mombasa Export</div><div class="sub">Under-utilized — 14%</div></div>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#616161" stroke-width="1.75" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      <div style="flex:1;"><div class="lbl">To</div><div class="nm">PR-017 · HQ Finance</div><div class="sub">Over-duty — 94%</div></div>
    </div>
    <div style="display:flex; align-items:center; gap:8px; margin-top:10px; padding-top:10px; border-top:1px solid #f0f0f0;">
      <span style="font-size:11px; color:#616161; flex:1;">Redirects 28,540 pp/mo · saves KES 12,400 in service visits</span>
      <button style="height:26px; padding:0 10px; border-radius:4px; background:#0f6cbd; color:#fff; border:none; font-size:11px; font-weight:500; cursor:pointer;">Approve</button>
      <button style="height:26px; padding:0 10px; border-radius:4px; background:transparent; color:#424242; border:none; font-size:11px; font-weight:500; cursor:pointer;">Dismiss</button>
    </div>
  </div>
</div>
</body></html>
