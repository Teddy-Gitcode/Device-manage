<!doctype html>
<html><head><meta charset="utf-8"><title>Neutrals</title><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card">
  <div class="grid" style="grid-template-columns: repeat(7, 1fr); gap: 10px;">
    <div class="swatch-col"><div class="swatch" style="background:#ffffff"></div><span class="name">bg-1</span><span>#FFFFFF</span></div>
    <div class="swatch-col"><div class="swatch" style="background:#fafafa"></div><span class="name">bg-2</span><span>#FAFAFA</span></div>
    <div class="swatch-col"><div class="swatch" style="background:#f5f5f5"></div><span class="name">bg-3</span><span>#F5F5F5</span></div>
    <div class="swatch-col"><div class="swatch" style="background:#faf9f8"></div><span class="name">canvas</span><span>#FAF9F8</span></div>
    <div class="swatch-col"><div class="swatch" style="background:#f0f0f0"></div><span class="name">divider</span><span>#F0F0F0</span></div>
    <div class="swatch-col"><div class="swatch" style="background:#e0e0e0"></div><span class="name">stroke-2</span><span>#E0E0E0</span></div>
    <div class="swatch-col"><div class="swatch" style="background:#d1d1d1"></div><span class="name">stroke-1</span><span>#D1D1D1</span></div>
  </div>
</div>
</body></html>
