<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card">
  <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
    <button style="height:32px; padding:0 16px; background:#0f6cbd; color:#fff; border:1px solid #0f6cbd; border-radius:4px; font-size:14px; font-weight:500; font-family:inherit; cursor:pointer;">Add device</button>
    <button style="height:32px; padding:0 16px; background:#115ea3; color:#fff; border:1px solid #115ea3; border-radius:4px; font-size:14px; font-weight:500; font-family:inherit; cursor:pointer;">Hover</button>
    <button style="height:32px; padding:0 16px; background:#0c3b5e; color:#fff; border:1px solid #0c3b5e; border-radius:4px; font-size:14px; font-weight:500; font-family:inherit; cursor:pointer;">Pressed</button>
    <button style="height:32px; padding:0 16px; background:#fff; color:#242424; border:1px solid #d1d1d1; border-radius:4px; font-size:14px; font-weight:500; font-family:inherit; cursor:pointer;">Export</button>
    <button style="height:32px; padding:0 16px; background:transparent; color:#242424; border:1px solid transparent; border-radius:4px; font-size:14px; font-weight:500; font-family:inherit; cursor:pointer;">Dismiss</button>
    <button style="height:28px; padding:0 12px; background:#fff; color:#242424; border:1px solid #d1d1d1; border-radius:4px; font-size:12px; font-weight:500; font-family:inherit; cursor:pointer;">Small</button>
    <button style="height:32px; padding:0 16px; background:#f5f5f5; color:#bdbdbd; border:1px solid #e0e0e0; border-radius:4px; font-size:14px; font-weight:500; font-family:inherit; cursor:not-allowed;">Disabled</button>
  </div>
</div>
</body></html>
