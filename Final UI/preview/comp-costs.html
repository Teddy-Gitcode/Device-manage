<!doctype html>
<html><head><meta charset="utf-8"><title>Cost by department</title><link rel="stylesheet" href="card.css"></head>
<body>
<style>
.row { display:flex; align-items:center; gap:10px; margin-bottom:6px; font-size:12px; font-variant-numeric: tabular-nums;}
.dep { width:90px; color:#424242; }
.bar { flex:1; height:18px; display:flex; background:#f5f5f5; border-radius:3px; overflow:hidden; }
.amt { width:90px; text-align:right; font-weight:500; }
</style>
<div class="card" style="padding:14px 16px;">
  <div style="font-size:14px; font-weight:600; margin-bottom:10px;">Cost by department · April</div>
  <div class="row"><span class="dep">Finance</span><div class="bar"><span style="width:52%; background:#0f6cbd;"></span><span style="width:18%; background:#9ec7ee;"></span></div><span class="amt">KES 58,400</span></div>
  <div class="row"><span class="dep">Operations</span><div class="bar"><span style="width:38%; background:#0f6cbd;"></span><span style="width:12%; background:#9ec7ee;"></span></div><span class="amt">KES 42,100</span></div>
  <div class="row"><span class="dep">Exports</span><div class="bar"><span style="width:22%; background:#0f6cbd;"></span><span style="width:24%; background:#9ec7ee;"></span></div><span class="amt">KES 38,900</span></div>
  <div class="row"><span class="dep">HR</span><div class="bar"><span style="width:14%; background:#0f6cbd;"></span><span style="width:4%; background:#9ec7ee;"></span></div><span class="amt">KES 8,800</span></div>
  <div style="display:flex; gap:12px; font-size:10px; color:#616161; margin-top:8px;">
    <span style="display:flex; gap:4px; align-items:center;"><span style="width:10px; height:10px; background:#0f6cbd;"></span>Mono</span>
    <span style="display:flex; gap:4px; align-items:center;"><span style="width:10px; height:10px; background:#9ec7ee;"></span>Color</span>
  </div>
</div>
</body></html>
