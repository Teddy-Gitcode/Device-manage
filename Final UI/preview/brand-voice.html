<!doctype html>
<html><head><meta charset="utf-8"><title>Voice & tone</title><link rel="stylesheet" href="card.css"></head>
<body>
<style>
.row { display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:8px;}
.do, .dont { padding:10px 12px; border-radius:6px; font-size:12px; line-height:17px; border:1px solid; }
.do { background:#dff6dd; color:#0b5510; border-color:#9fd89f; }
.dont { background:#fde7e9; color:#a4262c; border-color:#f1bbbc; text-decoration: line-through; }
.tag { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
</style>
<div class="card" style="padding:14px 16px;">
  <div class="row"><div class="do"><div class="tag">Do</div>Paper jam detected</div><div class="dont"><div class="tag">Don't</div>Oops! Your printer's jammed 😬</div></div>
  <div class="row"><div class="do"><div class="tag">Do</div>Toner low (12%)</div><div class="dont"><div class="tag">Don't</div>Running out of ink!</div></div>
  <div class="row"><div class="do"><div class="tag">Do</div>Schedule service</div><div class="dont"><div class="tag">Don't</div>Schedule your service</div></div>
</div>
</body></html>
