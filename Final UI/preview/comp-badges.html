<!doctype html>
<html><head><meta charset="utf-8"><title>Badges</title><link rel="stylesheet" href="card.css"></head>
<body>
<style>
.badge { display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:4px; font-size:12px; font-weight:500; border:1px solid; }
.badge .dot { width:6px; height:6px; border-radius:999px; background:currentColor; }
.ok { background:#dff6dd; color:#107c10; border-color:#9fd89f; }
.warn { background:#fff4ce; color:#835c00; border-color:#fdcfb4; }
.danger { background:#fde7e9; color:#a4262c; border-color:#f1bbbc; }
.info { background:#ebf3fc; color:#0f6cbd; border-color:#9ec7ee; }
.neutral { background:#f5f5f5; color:#424242; border-color:#e0e0e0; }
.chip { display:inline-flex; align-items:center; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:500; border:1px solid; }
.keep { background:#f5f5f5; color:#424242; border-color:#e0e0e0; }
.relocate { background:#ebf3fc; color:#0f6cbd; border-color:#9ec7ee; }
.service { background:#fde7e9; color:#a4262c; border-color:#f1bbbc; }
</style>
<div class="card">
  <div style="display:flex; flex-direction:column; gap:12px;">
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <span class="badge ok"><span class="dot"></span>Online</span>
      <span class="badge warn"><span class="dot"></span>Warning</span>
      <span class="badge danger"><span class="dot"></span>Needs service</span>
      <span class="badge info"><span class="dot"></span>Informational</span>
      <span class="badge neutral"><span class="dot"></span>Idle</span>
    </div>
    <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
      <span style="font-size:11px; color:#616161; text-transform:uppercase; letter-spacing:0.04em;">Action chip</span>
      <span class="chip keep">Keep</span>
      <span class="chip relocate">Relocate</span>
      <span class="chip service">Service</span>
    </div>
  </div>
</div>
</body></html>
