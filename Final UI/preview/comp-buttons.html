<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="card.css"></head>
<body>
<style>
.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; height:32px; padding:0 14px; border-radius:4px; font-family: var(--font-sans); font-size:13px; font-weight:500; cursor:pointer; border:1px solid transparent; transition: background .12s; }
.btn.primary { background:#0f6cbd; color:#fff; }
.btn.primary:hover { background:#115ea3; }
.btn.secondary { background:#fff; color:#242424; border-color:#d1d1d1; }
.btn.secondary:hover { background:#f5f5f5; }
.btn.subtle { background:transparent; color:#424242; }
.btn.subtle:hover { background:#f5f5f5; }
.btn.danger { background:#a4262c; color:#fff; }
.btn.small { height:24px; padding:0 10px; font-size:12px; }
</style>
<div class="card">
  <div style="display:flex; flex-direction:column; gap:12px;">
    <div style="display:flex; gap:8px; align-items:center;">
      <button class="btn primary">Add device</button>
      <button class="btn secondary">Export</button>
      <button class="btn subtle">Dismiss</button>
      <button class="btn danger">Take offline</button>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
      <button class="btn primary small">Approve</button>
      <button class="btn secondary small">Schedule service</button>
      <button class="btn subtle small">Cancel</button>
      <button class="btn secondary small" disabled style="opacity:.5; cursor:not-allowed;">Disabled</button>
    </div>
  </div>
</div>
</body></html>
